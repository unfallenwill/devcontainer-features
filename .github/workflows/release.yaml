name: "Release Dev Container Features"
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: "Publish Features"
        uses: devcontainers/action@v1
        with:
          publish-features: "true"
          base-path-to-features: "./src"
          generate-docs: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create PR for Documentation
        id: push_image_info
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          echo "Start."

          branch=automated-documentation-update-$GITHUB_RUN_ID
          echo "Creating branch: $branch"

          gh api \
            --method POST \
            /repos/$GITHUB_REPOSITORY/git/refs \
            -f ref="refs/heads/$branch" \
            -f sha="$GITHUB_SHA"

          message='Automated documentation update [skip ci]'

          readmes=$(find . -name "README.md" -path "*/*/README.md")

          if [ -z "$readmes" ]; then
            echo "No README files found to update"
            exit 0
          fi

          for readme in $readmes; do
            file_path=${readme:2}
            echo "Committing updates to $file_path"

            # Try to get existing file SHA (returns empty for new files)
            file_sha=$(gh api \
              --method GET \
              /repos/$GITHUB_REPOSITORY/contents/$file_path?ref=main \
              -q '.sha' 2>/dev/null || echo "")

            if [ -n "$file_sha" ]; then
              echo "Updating existing file, SHA: $file_sha"
              gh api \
                --method PUT \
                /repos/$GITHUB_REPOSITORY/contents/$file_path \
                -f message="$message" \
                -f content="$(base64 -i $readme)" \
                -f sha="$file_sha" \
                -f branch="$branch" \
                || echo "No changes to commit for $file_path"
            else
              echo "Creating new file: $file_path"
              gh api \
                --method PUT \
                /repos/$GITHUB_REPOSITORY/contents/$file_path \
                -f message="$message" \
                -f content="$(base64 -i $readme)" \
                -f branch="$branch" \
                || echo "Failed to create $file_path"
            fi
          done

          gh pr create --title "$message" --body "$message" --head "$branch" --base "main" || echo "No changes to create PR for"
